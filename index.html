<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>火場無線電通訊關鍵語詞研究－專家訪談表</title>
  <style>
    :root {
      --navy: #17324d; --navy-2: #24496f; --slate: #5b6b7c;
      --accent: #d85c3a; --accent-soft: #fff3ef; --line: #d6dde6;
      --soft: #f5f8fb; --soft-2: #eef3f8; --white: #ffffff;
    }
    body { font-family: "Noto Sans TC", sans-serif; background: #e9eef4; margin: 0; padding-bottom: 60px; color: #1f2937; }
    
    /* UI 組件樣式 */
    .top-banner { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%); color: white; padding: 40px 60px; text-align: center; }
    .workspace { max-width: 1000px; margin: -30px auto 0; padding: 0 20px; }
    .card { background: var(--white); border-radius: 20px; padding: 30px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(19, 41, 67, 0.08); border: 1px solid rgba(23, 50, 77, 0.05); }
    .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--line); margin-bottom: 20px; padding-bottom: 10px; }
    .card-title { font-size: 20px; color: var(--navy); font-weight: 800; }
    
    /* 分頁導覽 */
    .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; position: sticky; top: 10px; z-index: 100; }
    .tab-btn { padding: 10px 20px; border-radius: 999px; border: 1px solid var(--line); background: white; cursor: pointer; font-weight: 700; transition: 0.3s; }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.4s; }

    /* 表單元件 */
    .field { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 14px; font-weight: 700; color: var(--navy); }
    textarea, input { padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: var(--soft); outline: none; font-size: 14px; }
    .hint-box { background: var(--accent-soft); border-left: 5px solid var(--accent); padding: 15px; color: var(--accent); font-size: 13px; border-radius: 8px; margin-bottom: 15px; }
    
    /* 表格樣式 */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: var(--soft); padding: 12px; font-size: 13px; border: 1px solid var(--line); }
    td { padding: 12px; border: 1px solid var(--line); text-align: center; }
    .score-val { color: var(--accent); font-weight: 800; margin-left: 5px; }

    /* 頁尾感謝 */
    .footer-thanks { background: var(--navy); color: white; padding: 25px; border-radius: 15px; text-align: center; font-size: 14px; margin-top: 40px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="top-banner">
  <h1>火場無線電通訊關鍵語詞研究－專家訪談表</h1>
  <p>Research Use Only</p>
</div>

<div class="workspace">
  <!-- 分頁控制 -->
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab(0)">1. 基本資料</button>
    <button class="tab-btn" onclick="showTab(1)">2. 語詞評估 (46項)</button>
    <button class="tab-btn" onclick="showTab(2)">3. 深度見解</button>
    <button class="tab-btn" onclick="showTab(3)">4. 結構判斷</button>
  </div>

  <form id="mainForm">
    <!-- 第一部分：基本資料 -->
    <div class="tab-content active">
      <section class="card">
        <div class="card-header"><div class="card-title">一、研究基本資訊</div></div>
        <div class="field"><label>研究主題</label><textarea readonly>AI 與無線電通訊系統之專家關鍵語詞研究...</textarea></div>
      </section>
      <section class="card">
        <div class="card-header"><div class="card-title">二、訪談基本資料</div></div>
        <div class="field"><label>受訪者姓名/職稱</label><input type="text" name="expert_name"></div>
        <div class="field"><label>服務單位</label><input type="text" name="expert_unit"></div>
      </section>
    </div>

    <!-- 第二部分：三大模型表格 -->
    <div class="tab-content">
      <section class="card">
        <div class="card-header"><div class="card-title">關鍵語詞評分量表</div></div>
        <div class="hint-box">請針對語詞的使用頻率與重要性進行評分（常:3分, 偶爾:2分, 少:1分）。</div>
        <div id="table-container"></div>
      </section>
    </div>

    <!-- 第三部分：開放式問答 -->
    <div class="tab-content">
      <section class="card">
        <div class="card-header"><div class="card-title">五、關鍵語詞補充</div></div>
        <div class="field"><label>1. 是否有未列於清單中但重要的語詞？</label><textarea name="q5_1"></textarea></div>
      </section>
      <section class="card">
        <div class="card-header"><div class="card-title">八、Mayday 情境補充</div></div>
        <div class="field"><label>1. 是否存在未喊 Mayday 但實際已屬危急的語詞？</label><textarea name="q8_1"></textarea></div>
      </section>
    </div>

    <!-- 第四部分：通訊結構 (Section 9) -->
    <div class="tab-content">
      <section class="card">
        <div class="card-header">
          <div class="card-title">九、訪談內容（七）通訊結構判斷 WWWS</div>
          <div class="card-tag">Structure Judgment</div>
        </div>
        
        <div class="field">
          <label>1. 在火場通訊中，若常出現不完整語句，您會如何判斷？</label>
          <div class="hint-box">例如：「01 帶二線」、「01 帶人進中」、「01 藥劑量不足」</div>
          <textarea name="q9_1" placeholder="請描述您的判斷邏輯..."></textarea>
        </div>

        <div class="field">
          <label>2. 此類資訊是否足以支撐安全判斷？</label>
          <div style="display:flex; gap:20px; padding:5px 0;">
            <label><input type="radio" name="q9_2_radio" value="足夠"> 足夠</label>
            <label><input type="radio" name="q9_2_radio" value="不足"> 不足</label>
          </div>
          <textarea name="q9_2_text" placeholder="原因說明..."></textarea>
        </div>

        <div class="field">
          <label>3. 在什麼情況下，您會認為此為危險訊號？</label>
          <textarea name="q9_3" placeholder="請描述危險情境..."></textarea>
        </div>

        <div class="field">
          <label>4. 您認為完整通報應包含哪些資訊？（可複選）</label>
          <div style="display:flex; gap:15px; flex-wrap:wrap; padding:10px; background:var(--soft); border-radius:10px;">
            <label><input type="checkbox" name="wwws" value="Who"> 單位 Who</label>
            <label><input type="checkbox" name="wwws" value="Where"> 位置 Where</label>
            <label><input type="checkbox" name="wwws" value="What"> 行動 What</label>
            <label><input type="checkbox" name="wwws" value="State"> 狀態 State</label>
          </div>
        </div>
      </section>

      <div class="footer-thanks">
        感謝您接受參與本次高品質專家諮詢。您的意見將有助於建構更具安全導向之火場通訊語法與語詞研究基礎。
      </div>
      
      <div style="text-align:center; margin-top:30px;">
        <button type="button" class="tab-btn active" style="padding:15px 60px; font-size:18px;" onclick="finalSubmit()">確認並送出訪談表</button>
      </div>
    </div>
  </form>
</div>

<script>
  // 評分邏輯
  const toScore = (v) => ({'常':3,'偶爾':2,'少':1,'★★★':3,'★★':2,'★':1}[v] || '');

  // 分頁切換
  function showTab(index) {
    const tabs = document.querySelectorAll('.tab-content');
    const btns = document.querySelectorAll('.tab-btn');
    tabs.forEach((t, i) => t.classList.toggle('active', i === index));
    btns.forEach((b, i) => b.classList.toggle('active', i === index));
    window.scrollTo(0,0);
  }

  // 渲染表格 (示範一小段，您可以填入所有 46 項)
  const data = [
    { cat: '危險警示', s: '全面燃燒', r: '現場全面燃燒' },
    { cat: '人員狀態', s: '氣量不足', r: '氣量不足，準備撤出' },
    { cat: '緊急求救', s: 'MAYDAY', r: 'MAYDAY MAYDAY MAYDAY' }
  ];

  function initTables() {
    const container = document.getElementById('table-container');
    container.innerHTML = `<table>
      <thead><tr><th>類別</th><th>標準語詞</th><th>無線電語句</th><th>頻率</th><th>重要性</th></tr></thead>
      <tbody>${data.map((item, i) => `
        <tr>
          <td>${item.cat}</td>
          <td><b>${item.s}</b></td>
          <td style="text-align:left">${item.r}</td>
          <td><select onchange="this.nextSibling.innerText=toScore(this.value)"><option value="">-</option><option value="常">常</option><option value="偶爾">偶爾</option><option value="少">少</option></select><span class="score-val"></span></td>
          <td><select onchange="this.nextSibling.innerText=toScore(this.value)"><option value="">-</option><option value="★★★">★★★</option><option value="★★">★★</option><option value="★">★</option></select><span class="score-val"></span></td>
        </tr>`).join('')}</tbody></table>`;
  }

  function finalSubmit() {
    console.log("Form Data Captured!");
    alert("訪談表已完成！準備傳送到 Google Sheets。");
  }

  window.onload = initTables;
</script>
</body>
</html>
