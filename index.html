<!DOCTYPE html>
<html lang="zh-Hant">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>火場無線電通訊關鍵語詞研究－專家訪談表</title>
 <style>
 :root {
 --navy: #17324d; --navy-2: #24496f; --slate: #5b6b7c; --ink: #1f2937;
 --muted: #6b7280; --line: #d6dde6; --soft: #f5f8fb; --soft-2: #eef3f8;
 --accent: #d85c3a; --accent-soft: #fff3ef; --white: #ffffff;
 --success: #0f766e; --danger: #b91c1c;
 }
 * { box-sizing: border-box; }
 body { margin: 0; font-family: "Noto Sans TC", sans-serif; background: #e9eef4; color: var(--ink); line-height: 1.7; }
 .workspace { max-width: 1100px; margin: 32px auto 56px; padding: 0 20px; }
 .page { width: 100%; background: var(--white); border-radius: 22px; box-shadow: 0 18px 45px rgba(19, 41, 67, 0.12); overflow: hidden; margin-bottom: 30px; border: 1px solid rgba(23, 50, 77, 0.08); }
 
 /* 封面樣式 */
 .cover { min-height: 800px; position: relative; background: radial-gradient(circle at top right, rgba(216, 92, 58, 0.10), transparent 22%), linear-gradient(145deg, #f9fbfd 0%, #f2f6fa 45%, #eef3f8 100%); }
 .cover-topbar { height: 16px; background: linear-gradient(90deg, var(--navy), var(--navy-2), var(--accent)); }
 .cover-body { padding: 88px 72px 72px; }
 .cover-title { font-size: 40px; font-weight: 800; color: var(--navy); margin: 0 0 16px; }
 .cover-subtitle { font-size: 20px; color: var(--accent); font-weight: 700; margin-bottom: 26px; }
 .cover-summary { background: rgba(255,255,255,0.82); border-left: 5px solid var(--accent); padding: 24px; border-radius: 18px; color: var(--slate); }

 /* 表格與內容樣式 */
 .page-header { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 70%, #355d86 100%); color: white; padding: 30px 42px; }
 .page-body { padding: 34px 38px 42px; }
 .section { margin-bottom: 24px; border: 1px solid var(--line); border-radius: 20px; overflow: hidden; }
 .section-title { background: var(--soft); border-bottom: 1px solid var(--line); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
 .section-title h2 { margin: 0; font-size: 18px; color: var(--navy); }
 .section-content { padding: 20px; }
 
 /* 輸入框修正樣式 */
 input, input[type="date"], textarea, select {
 width: 100%; border: 1px solid var(--line); border-radius: 12px; background: #fff; padding: 12px 14px; font-size: 14px; font-family: inherit; transition: 0.2s;
 }
 input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(216, 92, 58, 0.1); }
 .textarea { min-height: 100px; resize: vertical; }
 
 .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
 .field label { font-size: 14px; font-weight: 700; color: var(--navy); }
 
 table { width: 100%; border-collapse: collapse; border: 1px solid var(--line); border-radius: 16px; overflow: hidden; }
 th { background: var(--soft); padding: 14px 12px; text-align: left; font-size: 14px; color: var(--navy); }
 td { padding: 12px; border-bottom: 1px solid var(--line); font-size: 14px; }
 .radio-box { background: #fbfcfe; border: 1px solid rgba(23,50,77,0.08); border-radius: 12px; padding: 10px; font-size: 13px; }

 .tab-btn, .btn { padding: 10px 16px; border-radius: 12px; border: 1px solid var(--line); background: #fff; cursor: pointer; font-weight: 700; }
 .tab-btn.active, .btn-primary { background: var(--navy); color: white; border-color: var(--navy); }
 .status-box { display: none; padding: 12px; border-radius: 12px; margin-bottom: 16px; border: 1px solid transparent; }
 .status-box.show { display: block; }
 .status-success { background: rgba(15,118,110,0.08); color: var(--success); }
 .hidden { display: none; }
 </style>
</head>
<body>
 <div class="workspace">
 <!-- 封面 -->
 <section class="page cover">
 <div class="cover-topbar"></div>
 <div class="cover-body">
 <div class="cover-title">火場無線電通訊關鍵語詞研究</div>
 <div class="cover-subtitle">專家訪談表</div>
 <div class="cover-summary">
 本研究旨在分析火場無線電通訊語句，建立安全導向之關鍵語詞分類。
 </div>
 </div>
 </section>

 <!-- 基本資料 -->
 <section class="page">
 <div class="page-header"><h1>一、基本資訊與經驗</h1></div>
 <div class="page-body">
 <div class="section">
 <div class="section-content">
 <div class="field"><label>訪談日期</label><input type="date" name="interview_date"></div>
 <div class="field"><label>受訪者職稱</label><input type="text" name="interviewee_title" placeholder="請輸入職稱"></div>
 <div class="field"><label>服務單位</label><input type="text" name="interviewee_dept" placeholder="請輸入單位"></div>
 <div class="field"><label>年資</label><input type="text" name="interviewee_years" style="width: 100px;"> 年</div>
 </div>
 </div>
 <div class="section">
 <div class="section-title"><h2>背景與通訊經驗</h2></div>
 <div class="section-content">
 <div class="field">
 <label>是否曾遇過通訊困難或壓力情境？如有，請簡述：</label>
 <textarea name="q3_experience" class="textarea"></textarea>
 </div>
 </div>
 </div>
 </div>
 </section>

 <!-- 語詞評估表格 -->
 <section class="page">
 <div class="page-header"><h1>二、語詞評估清單</h1></div>
 <div class="page-body">
 <div class="toolbar" style="margin-bottom: 20px; display: flex; gap: 10px;">
 <button class="tab-btn active" data-tab="Personnel_Status">人員狀態</button>
 <button class="tab-btn" data-tab="Risk_Alert">危險警示</button>
 <button class="tab-btn" data-tab="Mayday">緊急求救</button>
 </div>
 <div id="status_box" class="status-box"></div>
 <div class="tab-panel" data-panel="Personnel_Status"></div>
 <div class="tab-panel hidden" data-panel="Risk_Alert"></div>
 <div class="tab-panel hidden" data-panel="Mayday"></div>
 </div>
 </section>

 <!-- 開放問答 -->
 <section class="page">
 <div class="page-header"><h1>三、專業判斷問答</h1></div>
 <div class="page-body">
 <div class="section">
 <div class="section-content">
 <div class="field">
 <label>1. 請列出您認為「一聽到就會提高警覺」的語詞：</label>
 <textarea name="q5_key_terms" class="textarea"></textarea>
 </div>
 <div class="field">
 <label>2. 原因說明：</label>
 <textarea name="q5_reason" class="textarea"></textarea>
 </div>
 </div>
 </div>
 <div style="text-align:center; padding: 20px;">
 <button class="btn btn-primary" id="submit_btn" style="padding: 15px 50px;">完成並送出表單</button>
 </div>
 </div>
 </section>
 </div>

 <script>
 // 完整的語詞列表
 const TERMS = {
 Personnel_Status: [
 { term_id: 'P001', standard_term: '氣量不足', colloquial_term: '氣不夠', radio_phrase: '氣量不足，準備撤出' },
 { term_id: 'P002', standard_term: '殘壓警報', colloquial_term: '警報響了', radio_phrase: '殘壓警報啟動，開始撤出' },
 { term_id: 'P003', standard_term: '體力不支', colloquial_term: '沒力了', radio_phrase: '人員準備撤出輪替' },
 { term_id: 'P004', standard_term: '呼吸急促', colloquial_term: '很喘', radio_phrase: '人員呼吸急促，需注意氣量' },
 { term_id: 'P005', standard_term: '出現暈眩', colloquial_term: '頭很暈', radio_phrase: '人員出現暈眩狀況，需協助撤離' },
 { term_id: 'P006', standard_term: '體溫過高', colloquial_term: '太熱了', radio_phrase: '人員體溫過高，需降溫或撤出' },
 { term_id: 'P007', standard_term: '人員受傷', colloquial_term: '有人受傷', radio_phrase: '現場有人員受傷' },
 { term_id: 'P008', standard_term: '裝備異常', colloquial_term: '面罩/SCBA有問題', radio_phrase: '面罩漏氣 / SCBA異常' },
 { term_id: 'P009', standard_term: '通訊異常', colloquial_term: '無線電有問題', radio_phrase: '無線電斷續 / 通訊不良' },
 { term_id: 'P010', standard_term: '迷失方向', colloquial_term: '迷路了', radio_phrase: '人員於內部迷失方向' },
 { term_id: 'P011', standard_term: '單獨行動', colloquial_term: '一個人在做', radio_phrase: '人員單獨行動，請確認位置' },
 { term_id: 'P012', standard_term: '身體不適', colloquial_term: '感覺怪怪的', radio_phrase: '對身體感覺異常，先撤出' }
 ],
 Risk_Alert: [
 { term_id: 'R001', standard_term: '全面燃燒', colloquial_term: '火舌竄出', radio_phrase: '現場全面燃燒' },
 { term_id: 'R002', standard_term: '溫度快速上升', colloquial_term: '越來越熱', radio_phrase: '內部溫度快速上升' },
 { term_id: 'R003', standard_term: '火勢延燒', colloquial_term: '向外延燒', radio_phrase: '火勢向外延燒，注意防護' },
 { term_id: 'R004', standard_term: '濃煙密佈', colloquial_term: '煙很大', radio_phrase: '現場濃煙密布，能見度差' },
 { term_id: 'R005', standard_term: '煙色異常', colloquial_term: '煙是黃色的', radio_phrase: '現場煙色異常，注意爆燃風險' },
 { term_id: 'R006', standard_term: '煙流吸入', colloquial_term: '煙在吸', radio_phrase: '煙流脈動明顯，注意複燃風險' },
 { term_id: 'R007', standard_term: '煙層下降', colloquial_term: '煙壓很低', radio_phrase: '煙層快速下降，注意閃燃風險' },
 { term_id: 'R008', standard_term: '煙囪效應', colloquial_term: '煙往上竄', radio_phrase: '煙囪效應明顯，火勢快速向上延燒' },
 { term_id: 'R009', standard_term: '異常聲響', colloquial_term: '有怪聲', radio_phrase: '有異常聲響，注意結構或爆炸風險' },
 { term_id: 'R010', standard_term: '結構異音', colloquial_term: '有嘎吱聲', radio_phrase: '結構發出異音，注意坍塌立即撤離' },
 { term_id: 'R011', standard_term: '氣體洩漏', colloquial_term: '有嘶嘶聲', radio_phrase: '疑似氣體洩漏，注意爆炸風險' },
 { term_id: 'R012', standard_term: '異常氣流', colloquial_term: '風很怪', radio_phrase: '氣流異常，注意複燃風險' },
 { term_id: 'R013', standard_term: '結構不穩', colloquial_term: '快塌了', radio_phrase: '建築結構不穩，注意坍塌' },
 { term_id: 'R014', standard_term: '導電風險', colloquial_term: '還沒斷電', radio_phrase: '尚未斷電，注意觸電危害' },
 { term_id: 'R015', standard_term: '爆炸風險', colloquial_term: '有爆炸危險', radio_phrase: '現場可能發生爆炸' },
 { term_id: 'R016', standard_term: '火載量高', colloquial_term: '東西很多', radio_phrase: '火載量高，注意極端火勢' },
 { term_id: 'R017', standard_term: '動線受阻', colloquial_term: '東西擋住', radio_phrase: '雜物堆積，注意撤退路徑' },
 { term_id: 'R018', standard_term: '倉儲場所', colloquial_term: '倉庫', radio_phrase: '現場為倉儲場所' },
 { term_id: 'R019', standard_term: '危險物品', colloquial_term: '有危險物', radio_phrase: '危險物品場所，注意爆炸風險' },
 { term_id: 'R020', standard_term: '化學品', colloquial_term: '有化學品', radio_phrase: '疑似禁水物質，注意滅火藥劑選擇' },
 { term_id: 'R021', standard_term: '地下空間', colloquial_term: '地下室', radio_phrase: '地下空間作業，注意逃生' },
 { term_id: 'R022', standard_term: '高樓建築', colloquial_term: '高樓', radio_phrase: '高樓火警，注意垂直延燒' }
 ],
 Mayday: [
 { term_id: 'M001', standard_term: 'MAYDAY', colloquial_term: 'Mayday', radio_phrase: 'MAYDAY MAYDAY MAYDAY' },
 { term_id: 'M002', standard_term: '受困', colloquial_term: '卡住了', radio_phrase: 'MAYDAY 本人受困' },
 { term_id: 'M003', standard_term: '人員壓困', colloquial_term: '被壓住了', radio_phrase: 'MAYDAY 人員被壓住' },
 { term_id: 'M004', standard_term: '迷路', colloquial_term: '不知道在哪', radio_phrase: 'MAYDAY 我迷路 無法確認位置' },
 { term_id: 'M005', standard_term: '找不到出口', colloquial_term: '沒路出去', radio_phrase: 'MAYDAY 找不到出口' },
 { term_id: 'M006', standard_term: '無法移動', colloquial_term: '動不了', radio_phrase: 'MAYDAY 無法移動' },
 { term_id: 'M007', standard_term: '氣瓶耗盡', colloquial_term: '沒氣了', radio_phrase: 'MAYDAY 氣瓶耗盡' },
 { term_id: 'M008', standard_term: '呼吸困難', colloquial_term: '吸不到氣', radio_phrase: 'MAYDAY 呼吸困難' },
 { term_id: 'M009', standard_term: '人員受傷', colloquial_term: '受傷了', radio_phrase: 'MAYDAY 人員受傷無法行動' },
 { term_id: 'M010', standard_term: '面罩異常', colloquial_term: '面罩漏氣', radio_phrase: 'MAYDAY 面罩異常' },
 { term_id: 'M011', standard_term: '呼吸器故障', colloquial_term: '機器壞了', radio_phrase: 'MAYDAY 呼吸器故障' },
 { term_id: 'M012', standard_term: '墜落受傷', colloquial_term: '掉下去了', radio_phrase: 'MAYDAY 人員墜落受傷' },
 { term_id: 'M013', standard_term: '請求支援', colloquial_term: '救命', radio_phrase: 'MAYDAY 請求支援' }
 ]
 };

 function renderTable(category, target) {
 const rows = TERMS[category] || [];
 target.innerHTML = `<table>
 <thead><tr><th style="width:25%">語詞</th><th style="width:30%">範例語句</th><th style="width:15%">使用</th><th style="width:15%">重要性</th><th>備註</th></tr></thead>
 <tbody>${rows.map(item => `
 <tr class="term-row" data-category="${category}" data-id="${item.term_id}" data-name="${item.standard_term}">
 <td><strong>${item.standard_term}</strong><br><small>${item.colloquial_term}</small></td>
 <td><div class="radio-box">${item.radio_phrase}</div></td>
 <td><select name="is_used"><option value="會">會</option><option value="不會">不會</option></select></td>
 <td><select name="importance"><option value="3">★★★</option><option value="2">★★</option><option value="1">★</option></select></td>
 <td><input type="text" name="note"></td>
 </tr>`).join('')}</tbody></table>`;
 }

 function collectData() {
 const rid = 'R' + Date.now();
 // 抓取上方基本資料與開放問答
 const base = {
 response_id: rid,
 date: document.querySelector('[name="interview_date"]').value,
 title: document.querySelector('[name="interviewee_title"]').value,
 dept: document.querySelector('[name="interviewee_dept"]').value,
 years: document.querySelector('[name="interviewee_years"]').value,
 q3_exp: document.querySelector('[name="q3_experience"]').value,
 q5_key: document.querySelector('[name="q5_key_terms"]').value,
 q5_reason: document.querySelector('[name="q5_reason"]').value
 };

 // 抓取所有表格行
 const results = [];
 document.querySelectorAll('.term-row').forEach(row => {
 results.push({
 ...base,
 category: row.dataset.category,
 term_id: row.dataset.id,
 term_name: row.dataset.name,
 is_used: row.querySelector('[name="is_used"]').value,
 importance: row.querySelector('[name="importance"]').value,
 note: row.querySelector('[name="note"]').value
 });
 });
 return results;
 }

 function init() {
 document.querySelectorAll('.tab-panel').forEach(p => renderTable(p.dataset.panel, p));
 document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
 document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
 document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('hidden', p.dataset.panel !== btn.dataset.tab));
 }));
 document.getElementById('submit_btn').addEventListener('click', () => {
 const finalData = collectData();
 console.log("Final Data Ready:", finalData);
 alert("收集完成！共 " + finalData.length + " 筆語詞評估資料已準備好送出。");
 });
 }
 init();
 </script>
</body>
</html>
