<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V3 語詞清單</title>

<style>
body {
  font-family: "Microsoft JhengHei", sans-serif;
  background: #f5f8fb;
  padding: 20px;
}

/* 🔥 大字語詞 */
.term-big {
  font-size: 18px;
  font-weight: 800;
  color: #17324d;
}

/* 🔥 Mayday 高亮 */
.mayday {
  background: #ffe5e5;
  color: #b91c1c;
}

/* 🔥 放大視窗 */
.modal {
  display: none;
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#fff;
  padding:30px;
  border-radius:12px;
  font-size:24px;
  font-weight:bold;
}

/* 🔍 搜尋框 */
.search-box {
  margin-bottom:15px;
}

input {
  padding:10px;
  width:300px;
  font-size:16px;
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border:1px solid #ccc;
}

</style>
</head>

<body>

<h2>語詞清單（V3）</h2>

<div class="search-box">
  🔍 搜尋：<input type="text" id="search">
</div>

<table id="table">
<thead>
<tr>
  <th>標準語詞 / 台灣口語</th>
  <th>無線電語句</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<!-- 🔥 放大視窗 -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalText"></div>
</div>

<script>

const TERMS = [
  {s:'氣量不足', c:'氣不夠', r:'氣量不足，準備撤出'},
  {s:'殘壓警報', c:'警報響了', r:'殘壓警報啟動'},
  {s:'體力不支', c:'沒力了', r:'人員準備撤出'},
  {s:'MAYDAY', c:'Mayday', r:'MAYDAY MAYDAY', type:'mayday'}
];

function render(data){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach(item=>{
    const tr = document.createElement("tr");

    if(item.type==="mayday"){
      tr.classList.add("mayday");
    }

    tr.innerHTML = `
      <td class="term-big">${item.s} / ${item.c}</td>
      <td>${item.r}</td>
    `;

    tr.onclick = ()=>showModal(item.s + " / " + item.c);

    tbody.appendChild(tr);
  });
}

function showModal(text){
  document.getElementById("modalText").innerText = text;
  document.getElementById("modal").style.display = "flex";
}

document.getElementById("modal").onclick = ()=>{
  document.getElementById("modal").style.display = "none";
};

/* 🔍 搜尋功能 */
document.getElementById("search").addEventListener("input", e=>{
  const keyword = e.target.value;
  const filtered = TERMS.filter(t =>
    t.s.includes(keyword) || t.c.includes(keyword)
  );
  render(filtered);
});

render(TERMS);

</script>

</body>
</html>
